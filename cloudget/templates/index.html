<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>气象雷达拼图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e; color: #eee;
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
        }
        .header { text-align: center; padding: 24px 16px 12px; }
        .header h1 { font-size: 26px; letter-spacing: 3px; margin-bottom: 6px; }
        .header .src { font-size: 12px; color: #777; }
        .controls {
            display: flex; justify-content: center; align-items: center;
            gap: 12px; padding: 10px 16px 20px; flex-wrap: wrap;
        }
        .controls select, .controls button {
            padding: 10px 16px; border-radius: 6px; border: 1px solid #333;
            font-size: 15px; outline: none;
        }
        .controls select { background: #16213e; color: #eee; cursor: pointer; min-width: 140px; }
        .controls select:focus { border-color: #4fc3f7; }
        .controls button {
            background: #0f3460; color: #eee; cursor: pointer;
            border: none; padding: 10px 28px; font-weight: bold;
            transition: background 0.2s;
        }
        .controls button:hover { background: #1a5080; }
        .main {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 0 16px 30px; position: relative;
        }
        .img-container {
            max-width: 900px; width: 100%; position: relative;
            background: #111; border-radius: 8px; overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        .img-container img { width: 100%; display: block; transition: opacity 0.3s; }
        .img-container img.loading { opacity: 0.3; }
        .img-container .state {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
        }
        .img-container .spinner {
            width: 40px; height: 40px; border: 3px solid #333;
            border-top-color: #4fc3f7; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .img-info {
            text-align: center; padding: 8px; font-size: 13px; color: #888;
        }
        .footer { text-align: center; padding: 12px; color: #444; font-size: 12px; }
        @media (max-width: 600px) {
            .controls { flex-direction: column; gap: 8px; }
            .controls select, .controls button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>气象雷达拼图</h1>
        <p class="src">数据来源：中央气象台 nmc.cn</p>
    </div>

    <div class="controls">
        <select id="regionSelect">
            {% for name, slug in regions %}
            <option value="{{ slug }}">{{ name }}</option>
            {% endfor %}
        </select>
        <select id="timeSelect"></select>
        <button id="confirmBtn" type="button">确认</button>
    </div>

    <div class="main">
        <div class="img-container" id="imgContainer">
            <div class="state"><div class="spinner"></div></div>
        </div>
    </div>
    <div class="img-info" id="imgInfo"></div>
    <div class="footer">页面不自动刷新，手动选择确认即可</div>

    <script>
    const regionSelect = document.getElementById('regionSelect');
    const timeSelect = document.getElementById('timeSelect');
    const confirmBtn = document.getElementById('confirmBtn');
    const imgContainer = document.getElementById('imgContainer');
    const imgInfo = document.getElementById('imgInfo');

    let timeData = [];

    function showLoading() {
        imgContainer.innerHTML = '<div class="state"><div class="spinner"></div></div>';
        imgInfo.textContent = '';
    }

    function showImage(url, label) {
        const img = document.createElement('img');
        img.alt = '雷达图';
        img.className = 'loading';
        img.src = url;
        img.onload = () => { img.classList.remove('loading'); };
        img.onerror = () => {
            imgContainer.innerHTML = '<div class="state" style="color:#e74c3c">图片加载失败</div>';
        };
        imgContainer.innerHTML = '';
        imgContainer.appendChild(img);
        imgInfo.textContent = label ? `图片时间：${label}` : '';
    }

    function showError(msg) {
        imgContainer.innerHTML = `<div class="state" style="color:#e74c3c">${msg}</div>`;
        imgInfo.textContent = '';
    }

    function populateTimes(data) {
        timeData = data;
        timeSelect.innerHTML = '';
        data.forEach((t, i) => {
            const opt = document.createElement('option');
            opt.value = t.timestamp;
            opt.textContent = t.label + 'Z';
            timeSelect.appendChild(opt);
        });
    }

    async function loadTimes(slug) {
        showLoading();
        try {
            const resp = await fetch(`/api/times/${slug}`);
            const json = await resp.json();
            if (json.ok && json.data.length > 0) {
                populateTimes(json.data);
                return true;
            } else {
                showError('无法获取时间列表');
                return false;
            }
        } catch {
            showError('网络请求失败');
            return false;
        }
    }

    async function loadRadar(slug, timestamp) {
        const item = timeData.find(t => t.timestamp === timestamp);
        if (item) {
            showImage(item.url, item.label + 'Z');
            return;
        }
        showLoading();
        try {
            const resp = await fetch(`/api/radar/${slug}/${timestamp}`);
            const json = await resp.json();
            if (json.ok) {
                showImage(json.url, timeSelect.selectedOptions[0]?.textContent || '');
            } else {
                showError(json.error || '未找到图片');
            }
        } catch {
            showError('网络请求失败');
        }
    }

    async function handleConfirm() {
        const slug = regionSelect.value;
        const ts = timeSelect.value;
        if (!ts) return;
        showLoading();
        await loadRadar(slug, ts);
    }

    regionSelect.addEventListener('change', async () => {
        const slug = regionSelect.value;
        localStorage.setItem('lastRegion', slug);
        const ok = await loadTimes(slug);
        if (ok) await loadRadar(slug, timeSelect.value);
    });

    confirmBtn.addEventListener('click', handleConfirm);

    // Init
    (async () => {
        const saved = localStorage.getItem('lastRegion');
        if (saved) regionSelect.value = saved;
        const slug = regionSelect.value;
        const ok = await loadTimes(slug);
        if (ok) await loadRadar(slug, timeSelect.value);
    })();
    </script>
</body>
</html>
